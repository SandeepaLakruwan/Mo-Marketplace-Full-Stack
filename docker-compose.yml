services:
  # ─── PostgreSQL Database ───
  postgres:
    image: postgres:16-alpine
    container_name: mo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mo_marketplace"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── NestJS Backend ───
  api:
    build:
      context: ./mo-marketplace-api
      dockerfile: Dockerfile
      target: production
    container_name: mo_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]  # Better than wget
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── React Frontend ───
  web:
    build:
      context: ./mo-marketplace-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: mo_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  postgres_data:

networks:
  default:
    name: mo_network